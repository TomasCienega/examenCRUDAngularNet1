<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-lg border-0" style="width: 22rem; border-radius: 15px">
    <div class="text-center mb-4">
      <i class="bi bi-person-circle text-primary" style="font-size: 3rem"></i>
      <h3 class="fw-bold">Bienvenido</h3>
      <p class="text-muted">Ingresa tus credenciales</p>
    </div>

    <!-- <div class="alert alert-info" style="font-size: 0.8rem">
      <b>¿Es válido?:</b> {{ formularioLogin.valid }} <br />
      <b>Errores Correo:</b> {{ formularioLogin.get('correo')?.errors | json }} <br />
      <b>Errores Clave:</b> {{ formularioLogin.get('clave')?.errors | json }}
    </div> -->

    <form [formGroup]="formularioLogin" (ngSubmit)="iniciarSesion()">
      <div class="mb-3">
        <label class="form-label">Correo</label>
        <input type="email" formControlName="Correo" class="form-control" />
      </div>

      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <input type="password" formControlName="Clave" class="form-control" />
      </div>

      <button type="submit" [disabled]="formularioLogin.invalid" class="btn btn-primary w-100">
        INICIAR SESIÓN
      </button>
    </form>
  </div>
</div>
